{% extends "base.html" %}

{% block title %}Add Class | Virtual Classroom Attendance{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Academic Setup</p>
        <h2>Create Class</h2>
    </div>
</section>

<section class="panel">
    <form method="post" class="form-grid two-column">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label><span>Class Name</span><input type="text" name="class_name" required></label>
        <label><span>Department</span><input type="text" name="department" required></label>
        <label><span>Course</span><input type="text" name="course" required></label>
        <label><span>Year</span><input type="number" name="year" min="1" required></label>
        <label><span>Semester</span><input type="number" name="semester" min="1" required></label>
        <label><span>Division</span><input type="text" name="division" required></label>
        <label>
            <span>Teacher</span>
            <select name="teacher_id">
                <option value="">Unassigned</option>
                {% for teacher in teachers %}
                <option value="{{ teacher.teacher_id }}">{{ teacher.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            <span>Status</span>
            <select name="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </label>
        <div class="form-actions">
            <button type="submit" class="button">Save Class</button>
        </div>
    </form>
</section>
{% endblock %}
